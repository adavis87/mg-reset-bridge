
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Medical Guardian — Reset your password</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f7ede2;
    color: #2b2140;
    display: flex;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
  }
  main {
    text-align: center;
    padding: 32px 24px;
    max-width: 420px;
  }
  h1 { font-size: 22px; margin: 0 0 12px; }
  p { font-size: 16px; line-height: 1.5; margin: 0 0 28px; color: #4a3f63; }
  a.open {
    display: inline-block;
    background: #8c3f9b;
    color: #fff;
    text-decoration: none;
    font-size: 18px;
    font-weight: 600;
    padding: 16px 48px;
    border-radius: 999px;
  }
  .error { color: #a4133c; font-weight: 600; }
  footer { margin-top: 40px; font-size: 12px; color: #857a9c; }
</style>
</head>
<body>
<main>
  <h1>Reset your password</h1>
  <p id="msg">Tap the button below to continue in the Medical Guardian app.</p>
  <a class="open" id="open" href="#" hidden>Open app</a>
  <footer>Internal QA bridge — staging environment only.</footer>
</main>
<script>
  (function () {
    var code = location.hash.slice(1) ||
      new URLSearchParams(location.search).get("changePasswordId") || "";
    var msg = document.getElementById("msg");
    var open = document.getElementById("open");
    if (!code) {
      msg.textContent = "This link is missing its reset code. Please use the button in your most recent reset email.";
      msg.className = "error";
      return;
    }
    var schemeUrl = "mg-mobile-app://reset-password?changePasswordId=" + encodeURIComponent(code);
    var intentUrl = "intent://reset-password?changePasswordId=" + encodeURIComponent(code) +
      "#Intent;scheme=mg-mobile-app;package=com.medicalguardian.mgmobileapp;end";
    var href = /android/i.test(navigator.userAgent) ? intentUrl : schemeUrl;
    open.href = href;
    open.hidden = false;
    setTimeout(function () { location.href = href; }, 400);
  })();
</script>
</body>
</html>
